name:DeepAnalyzeFizzBuzzExe
on:
  push:
    paths:
      - '**'
jobs:
  analyze_binary:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
      - name: 1. Calculate Hashes
        run: |
          Write-Host "--- SHA256 HASH ---"
          Get-FileHash fizzbuzz.exe -Algorithm SHA256 | Format-List
      - name: 2. File Metadata
        run: |
          Write-Host "--- FILE INFO ---"
          Get-Item fizzbuzz.exe | Select-Object * | Format-List
      - name: 3. Static Analysis
        shell: cmd
        run: |
          echo --- PE HEADERS and IMPORTS ---
          dumpbin /HEADERS /IMPORTS /DEPENDENTS /SUMMARY fizzbuzz.exe
      - name: 4. Deep Disassembly
        shell: cmd
        run: |
          echo --- DISASSEMBLY (ASM CODE) ---
          dumpbin /DISASM fizzbuzz.exe
      - name: 5. Execution Test with Error Capture
        continue-on-error: true
        run: |
          Write-Host "--- ATTEMPTING EXECUTION ---"
          $process = Start-Process -FilePath ".\fizzbuzz.exe" -Wait -NoNewWindow -PassThru
          Write-Host "Exit Code: $($process.ExitCode)"
          if ($process.ExitCode -ne 0) {
            Write-Host "Process crashed or returned error."
          }
      - name: 6. Check Dependencies
        run: |
          Write-Host "--- CHECKING SYSTEM DLLS ---"
          ldd .\fizzbuzz.exe || Write-Host "ldd not found, skipping"
