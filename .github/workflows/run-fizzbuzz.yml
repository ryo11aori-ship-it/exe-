name:DeepAnalyzeFizzBuzzExe
on:
  push:
    paths:
      - '**'
jobs:
  analyze_binary:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
      - name: 1. Calculate Hashes
        run: |
          Write-Host "--- SHA256 HASH ---"
          Get-FileHash fizzbuzz.exe -Algorithm SHA256 | Format-List
          Write-Host "--- MD5 HASH ---"
          Get-FileHash fizzbuzz.exe -Algorithm MD5 | Format-List
      - name: 2. File Metadata and Attributes
        run: |
          Write-Host "--- FILE INFO ---"
          Get-Item fizzbuzz.exe | Select-Object * | Format-List
          Write-Host "--- ATTRIBUTES ---"
          attrib fizzbuzz.exe
      - name: 3. Hex Dump (First 2KB)
        run: |
          Write-Host "--- RAW HEX DUMP (HEAD) ---"
          Format-Hex -Path fizzbuzz.exe -Count 2048
      - name: 4. Static Analysis (PE Headers & Imports)
        shell: cmd
        run: |
          echo --- PE HEADERS and IMPORTS ---
          dumpbin /HEADERS /IMPORTS /DEPENDENTS /SUMMARY fizzbuzz.exe
      - name: 5. Deep Disassembly (The Naked Truth)
        shell: cmd
        run: |
          echo --- DISASSEMBLY (ASM CODE) ---
          dumpbin /DISASM fizzbuzz.exe
      - name: 6. Full Raw Dump (Optional - Very Long)
        shell: cmd
        run: |
          echo --- FULL RAW DATA DUMP ---
          dumpbin /RAWDATA fizzbuzz.exe
      - name: 7. Execution Test
        run: |
          Write-Host "--- RUNNING EXECUTABLE ---"
          try {
            .\fizzbuzz.exe
          } catch {
            Write-Host "Execution failed: $_"
          }
