name: Run fizzbuzz on Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show file info
        shell: pwsh
        run: |
          Write-Host "=== File existence check ==="
          Get-Item ./fizzbuzz | Format-List *

          Write-Host "=== First 64 bytes (hex) ==="
          $bytes = Get-Content ./fizzbuzz -Encoding Byte -TotalCount 64
          $bytes | ForEach-Object { $_.ToString("X2") } -join " "

      - name: Try to execute fizzbuzz
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "=== Attempting execution ==="
          try {
            & .\fizzbuzz
            Write-Host "Execution finished."
            Write-Host "ExitCode: $LASTEXITCODE"
          } catch {
            Write-Host "Execution failed with exception:"
            Write-Host $_
          }

      - name: Explicit exit code report
        shell: pwsh
        run: |
          Write-Host "Final observed exit code: $LASTEXITCODE"
