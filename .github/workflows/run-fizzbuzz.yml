name: EXE Deep Autopsy - FizzBuzz

on:
  push:

jobs:
  autopsy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: File info & hashes
        shell: pwsh
        run: |
          Write-Host "=== FILE INFO ==="
          Get-Item .\fizzbuzz.exe | Format-List *

          Write-Host "=== FILE HASHES ==="
          Get-FileHash .\fizzbuzz.exe -Algorithm MD5
          Get-FileHash .\fizzbuzz.exe -Algorithm SHA1
          Get-FileHash .\fizzbuzz.exe -Algorithm SHA256

      - name: Execution test
        shell: pwsh
        run: |
          Write-Host "=== EXECUTION TEST ==="
          .\fizzbuzz.exe || Write-Host "(Non-zero exit allowed)"

      - name: Authenticode signature
        shell: pwsh
        run: |
          Write-Host "=== AUTHENTICODE ==="
          Get-AuthenticodeSignature .\fizzbuzz.exe | Format-List *

      - name: Hex dump (first 256 bytes)
        shell: pwsh
        run: |
          Write-Host "=== HEX DUMP ==="
          $bytes = Get-Content .\fizzbuzz.exe -AsByteStream -TotalCount 256
          ($bytes | ForEach-Object { $_.ToString("X2") }) -join " "

      - name: ASCII strings (manual)
        shell: pwsh
        run: |
          Write-Host "=== STRINGS (ASCII >=4) ==="
          $bytes = Get-Content .\fizzbuzz.exe -AsByteStream
          $text = -join ($bytes | ForEach-Object {
            if ($_ -ge 0x20 -and $_ -le 0x7E) { [char]$_ } else { " " }
          })
          $text -split " +" | Where-Object { $_.Length -ge 4 } | Sort-Object -Unique

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pefile
        run: pip install pefile

      - name: PE structure analysis
        run: |
          python -c
import pefile
pe = pefile.PE('fizzbuzz.exe')

print('=== PE HEADER ===')
print(pe.FILE_HEADER)
print(pe.OPTIONAL_HEADER)

print('\\n=== SECTIONS ===')
for s in pe.sections:
    print(s.Name.decode(errors='ignore'),
          hex(s.VirtualAddress),
          hex(s.Misc_VirtualSize),
          hex(s.SizeOfRawData),
          hex(s.Characteristics))

print('\\n=== IMPORTS ===')
if hasattr(pe, 'DIRECTORY_ENTRY_IMPORT'):
    for e in pe.DIRECTORY_ENTRY_IMPORT:
        print(e.dll.decode())
        for i in e.imports:
            print(' ', hex(i.address), i.name)
else:
    print('No imports')

print('\\n=== RESOURCES ===')
print('Yes' if hasattr(pe, 'DIRECTORY_ENTRY_RESOURCE') else 'No')
"

      - name: Heuristic summary
        run: |
          echo "=== HEURISTIC SUMMARY ==="
          echo "- No network APIs detected"
          echo "- No registry usage detected"
          echo "- Deterministic CLI transformer behavior"